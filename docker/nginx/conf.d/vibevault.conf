# Bootstrap config — HTTP proxy + ACME webroot (no TLS yet).
# After obtaining certificates, replace with vibevault.https.conf (see DEPLOYMENT.md).

server {
  listen 80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /v1/search {
    limit_req zone=search burst=15 nodelay;
    proxy_pass http://vibevault_api;
    include /etc/nginx/proxy_params;
  }

  location / {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://vibevault_api;
    include /etc/nginx/proxy_params;
  }
}
