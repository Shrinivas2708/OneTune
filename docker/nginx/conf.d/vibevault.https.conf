# HTTPS config — use after Let's Encrypt certificates are issued.
# Copy over vibevault.conf: cp docker/nginx/conf.d/vibevault.https.conf docker/nginx/conf.d/vibevault.conf

server {
  listen 80;
  server_name ${VIBEVAULT_DOMAIN};

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name ${VIBEVAULT_DOMAIN};

  ssl_certificate /etc/letsencrypt/live/${VIBEVAULT_DOMAIN}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/${VIBEVAULT_DOMAIN}/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location /v1/search {
    limit_req zone=search burst=15 nodelay;
    proxy_pass http://vibevault_api;
    include /etc/nginx/proxy_params;
  }

  location / {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://vibevault_api;
    include /etc/nginx/proxy_params;
  }
}
