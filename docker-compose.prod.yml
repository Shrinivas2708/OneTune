# Production Docker Compose — VPS deployment
# Usage: docker compose -f docker-compose.prod.yml up --build -d
#
# Requires .env with JWT_SECRET, OneTune_DOMAIN, CERTBOT_EMAIL (see .env.example)

services:
  mongodb:
    image: mongo:7
    container_name: OneTune-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-OneTune}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  extractor:
    build:
      context: .
      dockerfile: docker/extractor.Dockerfile
    container_name: OneTune-extractor
    restart: unless-stopped
    environment:
      PORT: ${EXTRACTOR_PORT:-8001}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  jiosaavn:
    build:
      context: .
      dockerfile: docker/jiosaavn.Dockerfile
    container_name: OneTune-jiosaavn
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/api/search/songs?query=test').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  spotify:
    build:
      context: .
      dockerfile: docker/spotify.Dockerfile
    container_name: OneTune-spotify
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: OneTune-api
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/OneTune}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      EXTRACTOR_URL: ${EXTRACTOR_URL:-http://extractor:8001}
      JIOSAAVN_URL: ${JIOSAAVN_URL:-http://jiosaavn:3000}
      SPOTIFY_URL: ${SPOTIFY_URL:-http://spotify:8003}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mongodb:
        condition: service_healthy
      extractor:
        condition: service_healthy
      jiosaavn:
        condition: service_healthy
      spotify:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: OneTune-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      OneTune_DOMAIN: ${OneTune_DOMAIN:-}
      USE_HTTPS: ${USE_HTTPS:-false}
    volumes:
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy

  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  mongodb_data:
  certbot_www:
  certbot_conf:
