# Render Blueprint — OneTune backend (API + providers)
# https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo
# Set MONGODB_URI manually on the onetune-api service after Atlas is ready.

services:
  - type: web
    name: onetune-extractor
    runtime: docker
    dockerfilePath: ./docker/extractor.Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: onetune-spotify
    runtime: docker
    dockerfilePath: ./docker/spotify.Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: onetune-jiosaavn
    runtime: docker
    dockerfilePath: ./docker/jiosaavn.Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/search/songs?query=test
    autoDeploy: true

  - type: web
    name: onetune-api
    runtime: docker
    dockerfilePath: ./docker/api.Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: EXTRACTOR_URL
        fromService:
          type: web
          name: onetune-extractor
          envVarKey: RENDER_EXTERNAL_URL
      - key: SPOTIFY_URL
        fromService:
          type: web
          name: onetune-spotify
          envVarKey: RENDER_EXTERNAL_URL
      - key: JIOSAAVN_URL
        fromService:
          type: web
          name: onetune-jiosaavn
          envVarKey: RENDER_EXTERNAL_URL
